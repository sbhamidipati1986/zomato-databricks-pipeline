###############################################################################
# Zomato Analytics — CI Pipeline
# Triggers on: push to feature branches + PRs targeting main
###############################################################################

name: CI — Code Quality & Validation

on:
  push:
    branches:
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
      - develop

  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  PYTHON_VERSION: "3.11"

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Code Quality (Lint + Format Check + Tests)
  # -----------------------------------------------------------------------
  code-quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Flake8 lint check
        run: |
          flake8 data_generator/ config/ tests/ \
            --max-line-length 120 \
            --extend-ignore=E203,W503,E501 \
            --statistics \
            --count

      - name: Run unit tests
        run: |
          pytest tests/ \
            --cov=data_generator \
            --cov-report=term-missing \
            -v

  # -----------------------------------------------------------------------
  # Job 2: Validate Databricks Notebooks
  # -----------------------------------------------------------------------
  validate-notebooks:
    name: Validate Notebooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install nbformat
        run: pip install nbformat

      - name: Validate notebook syntax
        run: |
          echo "=== Validating notebook files ==="
          FAILED=0
          for notebook in $(find notebooks -name "*.ipynb" -type f); do
            echo "Checking: $notebook"
            python3 -c "
          import json, sys, nbformat
          try:
              with open('$notebook', 'r') as f:
                  nb = nbformat.read(f, as_version=4)
              for i, cell in enumerate(nb.cells):
                  if cell.cell_type == 'code':
                      clean = '\n'.join(
                          l for l in cell.source.splitlines()
                          if not l.strip().startswith('%') and not l.strip().startswith('!')
                      )
                      if clean.strip():
                          compile(clean, '$notebook:cell-' + str(i), 'exec')
              print('  ✓ Syntax OK')
          except (json.JSONDecodeError, nbformat.ValidationError) as e:
              print(f'  ✗ Notebook format error: {e}')
              sys.exit(1)
          except SyntaxError as e:
              print(f'  ✗ Syntax error in cell: {e}')
              sys.exit(1)
          " || FAILED=1
          done
          if [ $FAILED -eq 1 ]; then
            echo "✗ Notebook validation failed!"
            exit 1
          fi
          echo "✓ All notebooks validated"

      - name: Scan for hardcoded secrets
        run: |
          echo "=== Scanning for hardcoded secrets ==="
          if grep -rn --include="*.ipynb" -E "(password|secret|api_key|token)\s*=\s*['\"][^'\"]+['\"]" notebooks/; then
            echo "✗ Potential hardcoded secrets found!"
            exit 1
          fi
          if grep -rn --include="*.py" -E "(password|secret|api_key|token)\s*=\s*['\"][^'\"]+['\"]" data_generator/ config/ 2>/dev/null; then
            echo "✗ Potential hardcoded secrets found!"
            exit 1
          fi
          echo "✓ No hardcoded secrets detected"

  # -----------------------------------------------------------------------
  # Job 3: Pre-Merge Deployment Check (PRs to main only)
  # Deploys to a staging path, verifies all notebooks, then cleans up.
  # This catches deployment issues BEFORE code is merged to main.
  # -----------------------------------------------------------------------
  deploy-check:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs: [code-quality, validate-notebooks]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install requests

      - name: Dry-run deploy to staging path
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python3 scripts/deploy_notebooks.py \
            --host "$DATABRICKS_HOST" \
            --token "$DATABRICKS_TOKEN" \
            --workspace-path "/Workspace/Zomato-Analytics" \
            --dry-run

  # -----------------------------------------------------------------------
  # Job 4: CI Status Gate (for branch protection rules)
  # -----------------------------------------------------------------------
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [code-quality, validate-notebooks, deploy-check]
    if: always()
    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.code-quality.result }}" != "success" || \
                "${{ needs.validate-notebooks.result }}" != "success" ]]; then
            echo "✗ CI checks failed!"
            echo "  Code Quality : ${{ needs.code-quality.result }}"
            echo "  Notebooks    : ${{ needs.validate-notebooks.result }}"
            exit 1
          fi
          # deploy-check only runs on PRs — skip check on push events
          if [[ "${{ needs.deploy-check.result }}" != "success" && \
                "${{ needs.deploy-check.result }}" != "skipped" ]]; then
            echo "✗ Deployment gate failed!"
            echo "  Deploy Check : ${{ needs.deploy-check.result }}"
            exit 1
          fi
          echo "✓ All CI checks passed — ready for merge"
